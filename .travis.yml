language: bash

services:
  - docker

env:
  global:
    - aws_cli_version=2.0.30
    - aws_acc_num=674726326575
    - aws_region=eu-west-1
    - image_version=v5

before_install:
  - echo $aws_cli_version
  - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-$aws_cli_version.zip" -o "awscliv2.zip"
  - ls
  - unzip awscliv2.zip
  - sudo ./aws/install
  - export PATH=$PATH:$HOME/.local/bin
  - aws --version

jobs:
  include:
    - stage: build docker image
      if: NOT branch = master
      script:
        - echo ${aws_acc_num}
        - echo ${aws_region}
        - echo ${image_version}
        - aws --version
        - aws s3 ls
        - docker login -u AWS -p $(aws ecr get-login-password --region ${aws_region}) $aws_acc_num.dkr.ecr.${aws_region}.amazonaws.com
        - ls -a
        - docker build -t ${aws_acc_num}.dkr.ecr.${aws_region}.amazonaws.com/mern-stack:${image_version} .
        - docker image ls
        - docker push ${aws_acc_num}.dkr.ecr.${aws_region}.amazonaws.com/mern-stack:${image_version}
        # - docker build -t mern-stack:{image_version}
        # - aws ecr get-login-password --region ${aws_region} | docker login --username AWS --password-stdin ${aws_acc_num}.dkr.ecr.eu-west-1.amazonaws.com
      # check to see if image exists yet
      # - docker tag mern-stack:{image_version} {aws_acc_num}.dkr.ecr.{aws_region}.amazonaws.com/mern-stack:{image_version}
      # - docker push $DOCKER_USERNAME/travis-ci-build-stages-demo
